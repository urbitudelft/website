{{ define "main" }}
<h1 class="article-title text-center mb-4">{{ .Title }}</h1>

<!-- ===== FLEXIBLE BLOCK RENDERING ===== -->
{{ range .Params.blocks }}
  {{ if eq .type "text" }}
    <div class="article-text-block prose prose-slate lg:prose-xl dark:prose-invert mx-auto py-6 px-4 max-w-3xl">
      {{ .content | markdownify }}
    </div>
  {{ end }}

  {{ if eq .type "scrolly" }}
  <!-- === SCROLLYTELLING MODULE === -->
  <section id="scrolly-section">

    <!-- LEFT: MAP COLUMN -->
    <div id="map-column">
      <div id="map-container">
        <div id="map"></div>
      </div>
    </div>

    <!-- RIGHT: STORY STEPS -->
    <div class="story-container">
      {{ $.Content }}
    </div>

  </section>
  {{ end }}
{{ end }}

<!-- ========= PAGE STYLES ========= -->
<style>
html, body {
  overflow-x: hidden;
  font-family: system-ui, sans-serif;
}

.article-text-block {
  background: transparent;
  box-shadow: none;
  border-radius: 0;
  margin-top: 2rem;
  margin-bottom: 3rem;
}

/* Optional: increase text column width slightly */
@media (min-width: 1024px) {
  .article-text-block {
    max-width: 48rem; /* same ballpark as blog posts */
  }
}

/* === TEXT BLOCKS INSIDE SCROLLY === */
.text-block {
  max-width: 960px;              /* wider, like a normal article */
  margin: 0 auto 2.5rem auto;    /* center, with bottom spacing */
  padding: 0 1.25rem;            /* light side padding for readability */
  background: transparent;       /* no box background */
  border-radius: 0;              /* no rounded card look */
  box-shadow: none;              /* remove card shadow */
}

/* Optional: slightly nicer body text */
.text-block p {
  font-size: 1.05rem;
  line-height: 1.7;
  color: #111827;
  margin-bottom: 1.1rem;
}

.text-block h1,
.text-block h2,
.text-block h3 {
  margin-top: 2rem;
  margin-bottom: 0.75rem;
  font-weight: 600;
  color: #111827;
}


/* === SCROLLY LAYOUT === */
#scrolly-section {
  position: relative;
  padding: 4rem 2rem;
  display: flex;
  align-items: flex-start;
  gap: 2rem;
}

/* LEFT COLUMN: MAP */
#map-column {
  flex: 0 0 40vw;
  position: sticky;
  top: 6rem;
  align-self: flex-start;
}

/* Map container */
#map-container {
  position: relative;
  width: 100%;
  height: 70vh;
  box-sizing: border-box;
}

/* These classes are no longer used, but neutralise them just in case */
#map-container.fixed,
#map-container.at-bottom {
  position: relative !important;
  top: auto !important;
  left: auto !important;
  bottom: auto !important;
  width: 100% !important;
  height: 70vh !important;
}

/* Leaflet map */
#map {
  width: 100%;
  height: 100%;
}

/* RIGHT COLUMN: STORY STEPS */
.story-container {
  flex: 1 1 auto;
  max-width: 720px;
  padding: 0 1rem;
}

/* Step boxes */
.step {
  @apply prose prose-slate lg:prose-lg dark:prose-invert;
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(4px);
  padding: 2rem 2.25rem;
  margin-bottom: 3rem;
  border-left: 4px solid transparent;
  border-radius: 1rem;
  box-shadow: 0 6px 16px rgba(0,0,0,0.12);
}

.step h2 {
  margin-top: 0;
}

.step.is-active {
  border-left-color: #111827;
}

.stats-box {
  margin-top: 1rem;
  padding: 1rem;
  background: #f3f4f6;
  border-radius: .75rem;
}

/* === PHONE / VERTICAL SCREENS === */
@media (max-width: 800px), (orientation: portrait) {
  #scrolly-section {
    display: block !important;
    padding: 1rem 1rem 2rem !important;
  }

  #map-column {
    position: relative !important;
    top: auto !important;
    left: auto !important;
    width: 100% !important;
    margin: 0 0 1rem 0 !important;
    padding: 0 !important;
    z-index: 1 !important;
  }

  #map-container,
  #map-container.fixed,
  #map-container.at-bottom {
    position: relative !important;
    inset: auto !important;
    width: 100% !important;
    height: 38vh !important;
    min-height: 240px !important;
    max-height: 360px !important;
  }

  #map {
    width: 100% !important;
    height: 100% !important;
  }

  .story-container {
    max-width: 100% !important;
    padding: 0 !important;
  }

  .step {
    padding: 1.5rem 1.4rem !important;
    margin-bottom: 2rem !important;
    border-radius: 1rem !important;
    font-size: 1rem !important;
  }

  .step h2 {
    font-size: 1.45rem !important;
    line-height: 1.25 !important;
  }
}
</style>

<!-- ========= JAVASCRIPT ========= -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<script src="https://unpkg.com/scrollama"></script>
<script src="/js/bespoke-areas.js"></script>

<script>
function isVerticalScrollyScreen() {
  return window.matchMedia("(max-width: 800px), (orientation: portrait)").matches;
}

function cleanMobileMapClasses() {
  const mapContainer = document.getElementById("map-container");

  if (!mapContainer || !isVerticalScrollyScreen()) return;

  mapContainer.classList.remove("fixed", "at-bottom");

  mapContainer.style.position = "relative";
  mapContainer.style.top = "auto";
  mapContainer.style.left = "auto";
  mapContainer.style.bottom = "auto";
  mapContainer.style.width = "100%";

  if (window.map && typeof window.map.invalidateSize === "function") {
    setTimeout(() => window.map.invalidateSize(), 150);
  }
}

window.addEventListener("scroll", cleanMobileMapClasses, { passive: true });
window.addEventListener("resize", cleanMobileMapClasses);
document.addEventListener("DOMContentLoaded", cleanMobileMapClasses);
</script>

{{ end }}
